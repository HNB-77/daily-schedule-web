<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#155eef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="每日计划">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>每日计划安排</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #fff;
      --ink: #1d2433;
      --muted: #5f6b84;
      --line: #d8dfec;
      --brand: #155eef;
      --brand-soft: #eaf1ff;
      --ok: #0f7b43;
      --err: #b42318;
      --warn: #9a6700;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, #dbe7ff 0%, transparent 40%),
        radial-gradient(circle at 100% 20%, #d9f6ef 0%, transparent 38%),
        var(--bg);
    }
    header { padding: 24px 20px 8px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    header p { margin: 0; color: var(--muted); }
    main {
      padding: 16px 20px 28px;
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 26px rgba(18, 34, 70, 0.06);
    }
    h2 { margin: 0 0 12px; font-size: 20px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .full { grid-column: 1 / -1; }
    .hidden { display: none; }
    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    input, select, textarea, button {
      border-radius: 8px;
      border: 1px solid var(--line);
      font-size: 14px;
      padding: 10px;
    }
    button {
      cursor: pointer;
      background: var(--brand-soft);
      border-color: #c9dafd;
      color: var(--brand);
      font-weight: 600;
    }
    button:hover { filter: brightness(0.98); }
    .danger {
      background: #fff0f1;
      border-color: #ffd0d5;
      color: var(--err);
    }
    ul {
      margin: 12px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }
    li {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .meta { font-size: 12px; color: var(--muted); }
    .status { min-height: 22px; margin: 8px 0 10px; color: var(--ok); }
    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      font-size: 13px;
      text-align: left;
    }
    th { background: #f4f7ff; }
    .break { color: var(--warn); }
    .box {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
    }
    @media (max-width: 1060px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>每日计划安排</h1>
    <p>固定时段 + 近期目标 + 番茄钟自动排程 + 一键导出日历</p>
  </header>

  <main>
    <section class="card">
      <h2>固定时间段</h2>
      <form id="fixed-form" class="grid">
        <label>名称
          <input id="fb-title" required placeholder="通勤 / 会议 / 运动">
        </label>
        <label>开始
          <input id="fb-start" type="time" value="09:00" required>
        </label>
        <label>结束
          <input id="fb-end" type="time" value="10:00" required>
        </label>
        <label>重复
          <select id="fb-recur">
            <option value="daily">每天</option>
            <option value="weekdays">工作日</option>
            <option value="weekends">周末</option>
            <option value="once">仅某一天</option>
          </select>
        </label>
        <label id="fb-once-date-wrap" class="full hidden">仅当天日期
          <input id="fb-once-date" type="date">
        </label>
        <button type="submit">添加固定时段</button>
      </form>
      <ul id="fixed-list"></ul>
    </section>

    <section class="card">
      <h2>近期目标</h2>
      <form id="goal-form" class="grid">
        <label>目标
          <input id="goal-title" required placeholder="比如：准备面试">
        </label>
        <label>截止日
          <input id="goal-deadline" type="date" required>
        </label>
        <label>每周投入(小时)
          <input id="goal-hours" type="number" min="1" step="0.5" value="6" required>
        </label>
        <label>优先级(1-5)
          <input id="goal-priority" type="number" min="1" max="5" value="3" required>
        </label>
        <label class="full">备注
          <textarea id="goal-notes" rows="2" placeholder="可选"></textarea>
        </label>
        <button type="submit">添加目标</button>
      </form>
      <ul id="goal-list"></ul>
    </section>

    <section class="card">
      <h2>计划生成</h2>
      <div class="grid">
        <label>计划日期
          <input id="plan-date" type="date">
        </label>
        <button id="generate-btn" type="button">生成当天计划</button>
        <button id="export-btn" type="button">导出日历(.ics)</button>
      </div>

      <details>
        <summary>AI 优化(可选，仅 HTTPS)</summary>
        <div class="grid">
          <label class="full">接口地址
            <input id="ai-endpoint" placeholder="https://example.com/optimize">
          </label>
          <label class="full">Token
            <input id="ai-token" type="password" placeholder="可选">
          </label>
          <button id="save-ai" type="button">保存AI配置</button>
        </div>
      </details>

      <p id="status" class="status"></p>
      <div id="timeline"></div>
      <div id="conflicts"></div>
      <div id="suggestions"></div>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      var KEY = "daily_schedule_single_page_v1";
      var state = loadState();
      var currentPlan = null;

      var fixedForm = document.getElementById("fixed-form");
      var goalForm = document.getElementById("goal-form");
      var fixedList = document.getElementById("fixed-list");
      var goalList = document.getElementById("goal-list");
      var planDateInput = document.getElementById("plan-date");
      var generateBtn = document.getElementById("generate-btn");
      var exportBtn = document.getElementById("export-btn");
      var statusEl = document.getElementById("status");
      var timelineEl = document.getElementById("timeline");
      var conflictsEl = document.getElementById("conflicts");
      var suggestionsEl = document.getElementById("suggestions");
      var aiEndpointInput = document.getElementById("ai-endpoint");
      var aiTokenInput = document.getElementById("ai-token");
      var saveAiBtn = document.getElementById("save-ai");
      var onceDateWrap = document.getElementById("fb-once-date-wrap");
      var recurSelect = document.getElementById("fb-recur");

      init();

      function init() {
        planDateInput.value = dateKey(new Date());
        setValue("fb-once-date", planDateInput.value);
        aiEndpointInput.value = state.ai.endpoint || "";
        aiTokenInput.value = state.ai.token || "";
        renderFixedBlocks();
        renderGoals();
        loadPlanByDate();
        bindEvents();
        toggleOnceDateField();
        registerServiceWorkerIfSupported();
        autoGenerateIfNeeded();
        scheduleAutoCheck();
      }

      function bindEvents() {
        recurSelect.addEventListener("change", toggleOnceDateField);

        fixedForm.addEventListener("submit", function (e) {
          e.preventDefault();
          var title = text("fb-title");
          var recurrence = value("fb-recur");
          var onceDate = value("fb-once-date");
          if (!title) return;
          if (recurrence === "once" && !onceDate) {
            onceDate = planDateInput.value || dateKey(new Date());
          }
          state.fixedBlocks.push({
            id: uid(),
            title: title,
            startTime: value("fb-start"),
            endTime: value("fb-end"),
            recurrence: recurrence,
            specificDate: recurrence === "once" ? onceDate : "",
            immutable: true
          });
          saveState();
          renderFixedBlocks();
          fixedForm.reset();
          setValue("fb-start", "09:00");
          setValue("fb-end", "10:00");
          setValue("fb-recur", "daily");
          setValue("fb-once-date", planDateInput.value || dateKey(new Date()));
          toggleOnceDateField();
        });

        goalForm.addEventListener("submit", function (e) {
          e.preventDefault();
          var title = text("goal-title");
          if (!title) return;
          state.goals.push({
            id: uid(),
            title: title,
            deadline: value("goal-deadline"),
            weeklyHours: Number(value("goal-hours")),
            priority: Number(value("goal-priority")),
            notes: value("goal-notes")
          });
          saveState();
          renderGoals();
          goalForm.reset();
          setValue("goal-hours", "6");
          setValue("goal-priority", "3");
        });

        fixedList.addEventListener("click", function (e) {
          var t = e.target;
          if (!t || t.dataset.type !== "fb") return;
          var id = t.dataset.id;
          state.fixedBlocks = state.fixedBlocks.filter(function (x) { return x.id !== id; });
          saveState();
          renderFixedBlocks();
        });

        goalList.addEventListener("click", function (e) {
          var t = e.target;
          if (!t || t.dataset.type !== "goal") return;
          var id = t.dataset.id;
          state.goals = state.goals.filter(function (x) { return x.id !== id; });
          saveState();
          renderGoals();
        });

        generateBtn.addEventListener("click", function () {
          generateForDate(planDateInput.value, false);
        });

        exportBtn.addEventListener("click", function () {
          if (!currentPlan) {
            setStatus("请先生成当天计划。", true);
            return;
          }
          downloadICS(currentPlan, state.goals);
          setStatus("已导出 .ics 文件。iOS 点击文件即可导入系统日历。", false);
        });

        saveAiBtn.addEventListener("click", function () {
          var endpoint = normalizeHttps(value("ai-endpoint"));
          if (endpoint === null) {
            setStatus("AI 接口地址无效，请使用 HTTPS。", true);
            return;
          }
          state.ai.endpoint = endpoint;
          state.ai.token = value("ai-token");
          saveState();
          aiEndpointInput.value = endpoint;
          setStatus("AI 配置已保存。", false);
        });

        planDateInput.addEventListener("change", loadPlanByDate);
      }

      function loadState() {
        var raw = localStorage.getItem(KEY);
        if (!raw) return defaultState();
        try {
          var p = JSON.parse(raw);
          return {
            fixedBlocks: p.fixedBlocks || [],
            goals: p.goals || [],
            plansByDate: p.plansByDate || {},
            ai: p.ai || { endpoint: "", token: "" },
            auto: p.auto || { lastAutoGenerateDate: "" }
          };
        } catch (e) {
          return defaultState();
        }
      }

      function defaultState() {
        return {
          fixedBlocks: [],
          goals: [],
          plansByDate: {},
          ai: { endpoint: "", token: "" },
          auto: { lastAutoGenerateDate: "" }
        };
      }

      function saveState() {
        localStorage.setItem(KEY, JSON.stringify(state));
      }

      function loadPlanByDate() {
        var key = planDateInput.value;
        var raw = state.plansByDate[key];
        currentPlan = raw ? hydratePlan(raw) : null;
        renderPlan();
      }

      function generateForDate(dateText, silent) {
        if (!state.goals.length) {
          setStatus("请先添加至少一个近期目标。", true);
          return;
        }
        var base = generatePlan({
          date: parseDateOnly(dateText),
          fixedBlocks: state.fixedBlocks,
          goals: state.goals
        });
        maybeOptimize(base, state.goals, state.ai).then(function (plan) {
          currentPlan = plan;
          state.plansByDate[dateKey(plan.date)] = serializePlan(plan);
          saveState();
          if (!silent) {
            setStatus(plan.usedAIOptimization ? "已生成计划（规则 + AI 优化）。" : "已生成计划（规则引擎）。", false);
          }
          renderPlan();
        });
      }

      function autoGenerateIfNeeded() {
        var now = new Date();
        if (now.getHours() < 22 || !state.goals.length) return;
        var today = dateKey(now);
        if (state.auto.lastAutoGenerateDate === today) return;

        var tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        var key = dateKey(tomorrow);
        generateForDate(key, true);
        state.auto.lastAutoGenerateDate = today;
        saveState();
      }

      function scheduleAutoCheck() {
        var now = new Date();
        var next = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 22, 0, 0, 0);
        if (next <= now) next = new Date(next.getFullYear(), next.getMonth(), next.getDate() + 1, 22, 0, 0, 0);
        setTimeout(function () {
          autoGenerateIfNeeded();
          scheduleAutoCheck();
        }, next.getTime() - now.getTime());
      }

      function renderFixedBlocks() {
        var html = state.fixedBlocks.map(function (b) {
          var recur = b.recurrence === "daily" ? "每天"
            : (b.recurrence === "weekdays" ? "工作日"
            : (b.recurrence === "weekends" ? "周末" : ("仅 " + (b.specificDate || "指定日期"))));
          return "<li><div><strong>" + escapeHtml(b.title) + "</strong><div class='meta'>" + b.startTime + " - " + b.endTime + " | " + recur + "</div></div>"
            + "<button class='danger' data-type='fb' data-id='" + b.id + "'>删除</button></li>";
        }).join("");
        fixedList.innerHTML = html;
      }

      function renderGoals() {
        var html = state.goals.map(function (g) {
          var notes = g.notes ? "<div class='meta'>" + escapeHtml(g.notes) + "</div>" : "";
          return "<li><div><strong>" + escapeHtml(g.title) + "</strong><div class='meta'>截止日: " + g.deadline + " | 每周: "
            + g.weeklyHours + "h | 优先级: " + g.priority + "</div>" + notes + "</div>"
            + "<button class='danger' data-type='goal' data-id='" + g.id + "'>删除</button></li>";
        }).join("");
        goalList.innerHTML = html;
      }

      function renderPlan() {
        if (!currentPlan) {
          timelineEl.innerHTML = "<p>还没有计划，点击“生成当天计划”。</p>";
          conflictsEl.innerHTML = "";
          suggestionsEl.innerHTML = "";
          return;
        }

        var rows = currentPlan.sessions.map(function (s) {
          var title = s.type === "work" ? goalTitle(s.goalId) : (s.durationMin >= 15 ? "长休息" : "短休息");
          return "<tr><td>" + hhmm(s.slot.start) + " - " + hhmm(s.slot.end) + "</td><td>" + escapeHtml(title)
            + "</td><td class='" + (s.type === "break" ? "break" : "") + "'>" + s.durationMin + " min</td></tr>";
        }).join("");

        timelineEl.innerHTML = "<table><thead><tr><th>时间</th><th>任务</th><th>时长</th></tr></thead><tbody>" + rows + "</tbody></table>";

        if (currentPlan.conflicts.length) {
          conflictsEl.innerHTML = "<div class='box'><strong>冲突提示</strong><ul>"
            + currentPlan.conflicts.map(function (c) { return "<li>" + escapeHtml(c.message) + "</li>"; }).join("")
            + "</ul></div>";
        } else {
          conflictsEl.innerHTML = "";
        }

        if (currentPlan.swapSuggestions.length) {
          suggestionsEl.innerHTML = "<div class='box'><strong>调换建议</strong><ul>"
            + currentPlan.swapSuggestions.map(function (s) {
              return "<li>" + escapeHtml(s.reason) + "（建议时段: " + hhmm(s.toSlot.start) + " - " + hhmm(s.toSlot.end) + "）</li>";
            }).join("")
            + "</ul></div>";
        } else {
          suggestionsEl.innerHTML = "";
        }
      }

      function goalTitle(goalId) {
        var g = state.goals.find(function (x) { return x.id === goalId; });
        return g ? g.title : "专注任务";
      }

      function normalizeHttps(raw) {
        var s = (raw || "").trim();
        if (!s) return "";
        if (!/^[a-zA-Z][a-zA-Z\\d+\\-.]*:\\/\\//.test(s)) s = "https://" + s;
        if (/^http:\\/\\//i.test(s)) s = s.replace(/^http:\\/\\//i, "https://");
        try {
          var u = new URL(s);
          if (u.protocol !== "https:") return null;
          return u.toString().replace(/\\/$/, "");
        } catch (e) {
          return null;
        }
      }

      function maybeOptimize(basePlan, goals, ai) {
        if (!window.fetch || !navigator.onLine || !ai || !ai.endpoint || !/^https:\\/\\//i.test(ai.endpoint)) {
          return Promise.resolve(basePlan);
        }
        var headers = { "Content-Type": "application/json" };
        if (ai.token) headers.Authorization = "Bearer " + ai.token;
        var payload = { dateISO8601: basePlan.date.toISOString(), goals: goals, sessions: basePlan.sessions };
        return fetch(ai.endpoint, { method: "POST", headers: headers, body: JSON.stringify(payload) })
          .then(function (r) { if (!r.ok) throw new Error("bad response"); return r.json(); })
          .then(function (data) {
            if (!data || !Array.isArray(data.reorderedSessionIds) || !data.reorderedSessionIds.length) return basePlan;
            var map = {};
            basePlan.sessions.forEach(function (s) { map[s.id] = s; });
            var reordered = data.reorderedSessionIds.map(function (id) { return map[id]; });
            if (reordered.some(function (x) { return !x; }) || reordered.length !== basePlan.sessions.length) return basePlan;
            return {
              id: basePlan.id,
              date: basePlan.date,
              sessions: reordered,
              conflicts: basePlan.conflicts,
              swapSuggestions: basePlan.swapSuggestions,
              generatedAt: new Date(),
              usedAIOptimization: true
            };
          })
          .catch(function () { return basePlan; });
      }

      function generatePlan(input) {
        var date = input.date;
        var fixedBlocks = input.fixedBlocks || [];
        var goals = input.goals || [];
        var dayStart = at(date, 6, 0);
        var dayEnd = at(date, 23, 0);

        var blocked = fixedBlocks
          .filter(function (b) { return matchRecurrence(b.recurrence, date, b.specificDate); })
          .map(function (b) {
            var s = b.startTime.split(":");
            var e = b.endTime.split(":");
            var start = at(date, Number(s[0]), Number(s[1]));
            var end = at(date, Number(e[0]), Number(e[1]));
            if (end <= start) end = new Date(end.getTime() + 24 * 60 * 60000);
            return { start: start, end: end };
          })
          .sort(function (a, b) { return a.start - b.start; });

        var freeSlots = subtract([{ start: dayStart, end: dayEnd }], blocked);
        var demands = buildDemands(goals, date);
        var totalFree = freeSlots.reduce(function (n, s) { return n + mins(s.start, s.end); }, 0);
        var totalReq = demands.reduce(function (n, d) { return n + d.remaining; }, 0);

        var sessions = [];
        var streak = 0;
        freeSlots.forEach(function (slot) {
          var cursor = new Date(slot.start.getTime());
          while (cursor < slot.end) {
            var idx = nextDemand(demands);
            if (idx < 0) break;
            var workEnd = new Date(cursor.getTime() + 25 * 60000);
            if (workEnd > slot.end) break;

            sessions.push({
              id: uid(),
              goalId: demands[idx].goal.id,
              type: "work",
              durationMin: 25,
              energyTag: streak < 4 ? "focus" : "deep-focus",
              flexible: true,
              slot: { start: cursor, end: workEnd }
            });
            demands[idx].remaining = Math.max(0, demands[idx].remaining - 25);
            cursor = workEnd;
            streak += 1;

            if (!demands.some(function (d) { return d.remaining > 0; })) continue;
            var breakMin = streak % 4 === 0 ? 15 : 5;
            var breakEnd = new Date(cursor.getTime() + breakMin * 60000);
            if (breakEnd <= slot.end) {
              sessions.push({
                id: uid(),
                goalId: null,
                type: "break",
                durationMin: breakMin,
                energyTag: breakMin === 15 ? "long-break" : "break",
                flexible: true,
                slot: { start: cursor, end: breakEnd }
              });
              cursor = breakEnd;
            }
          }
        });

        sessions.sort(function (a, b) { return a.slot.start - b.slot.start; });
        var conflicts = buildConflicts(demands, totalFree, totalReq);
        var suggestions = buildSuggestions(sessions, conflicts, goals, dayStart, dayEnd);

        return {
          id: uid(),
          date: new Date(date.getTime()),
          sessions: sessions,
          conflicts: conflicts,
          swapSuggestions: suggestions,
          generatedAt: new Date(),
          usedAIOptimization: false
        };
      }

      function buildDemands(goals, date) {
        var today = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        return goals.map(function (g) {
          var d = parseDateOnly(g.deadline);
          var days = Math.floor((d - today) / 86400000) + 1;
          if (days < 1) days = 1;
          var base = Math.floor((g.weeklyHours * 60) / 7);
          if (base < 25) base = 25;
          var urgency = days <= 3 ? 1.8 : (days <= 7 ? 1.35 : 1);
          var p = Math.max(1, Math.min(5, Number(g.priority) || 1));
          var demand = Math.floor(base * urgency * (0.7 + p * 0.15));
          if (demand < 25) demand = 25;
          var score = p * 0.6 + (1 / days) * 8;
          return { goal: g, remaining: demand, score: score };
        });
      }

      function nextDemand(demands) {
        var best = -1, weight = -1;
        for (var i = 0; i < demands.length; i += 1) {
          if (demands[i].remaining <= 0) continue;
          var w = demands[i].score * (1 + demands[i].remaining / 100);
          if (w > weight) { weight = w; best = i; }
        }
        return best;
      }

      function buildConflicts(demands, free, req) {
        var list = [];
        if (req > free) {
          list.push({
            id: uid(),
            goalId: null,
            goalTitle: "整体容量不足",
            missingMinutes: req - free,
            message: "今日可用时段不足，建议压缩低优先级任务或提前开始。",
            type: "deadlineRisk"
          });
        }
        demands.forEach(function (d) {
          if (d.remaining > 0) {
            list.push({
              id: uid(),
              goalId: d.goal.id,
              goalTitle: d.goal.title,
              missingMinutes: d.remaining,
              message: d.goal.title + " 今日仍缺少 " + d.remaining + " 分钟可执行时间。",
              type: "insufficientTime"
            });
          }
        });
        return list;
      }

      function buildSuggestions(sessions, conflicts, goals, dayStart, dayEnd) {
        if (!conflicts.length) return [];
        var map = {};
        goals.forEach(function (g) { map[g.id] = g; });
        var work = sessions.filter(function (s) { return s.type === "work"; });
        var list = [];

        var low = work.reduce(function (best, s) {
          var p = (map[s.goalId] ? map[s.goalId].priority : 0);
          if (!best || p < best.p) return { s: s, p: p };
          return best;
        }, null);
        if (low) {
          list.push({
            id: uid(),
            sessionId: low.s.id,
            fromSlot: cloneSlot(low.s.slot),
            toSlot: cloneSlot(low.s.slot),
            reason: "可将低优先级时段替换给 " + conflicts[0].goalTitle + "，缓解紧急目标压力。",
            score: 0.86
          });
        }

        if (work[0]) {
          var st = new Date(work[0].slot.start.getTime() - 30 * 60000);
          var ed = new Date(st.getTime() + 25 * 60000);
          if (st >= dayStart && ed <= dayEnd) {
            list.push({
              id: uid(),
              sessionId: work[0].id,
              fromSlot: cloneSlot(work[0].slot),
              toSlot: { start: st, end: ed },
              reason: "提前 30 分钟开始，可额外腾出 1 个番茄钟。",
              score: 0.78
            });
          }
        }

        if (work[work.length - 1]) {
          var st2 = new Date(work[work.length - 1].slot.end.getTime() + 5 * 60000);
          var ed2 = new Date(st2.getTime() + 25 * 60000);
          if (ed2 <= dayEnd) {
            list.push({
              id: uid(),
              sessionId: work[work.length - 1].id,
              fromSlot: cloneSlot(work[work.length - 1].slot),
              toSlot: { start: st2, end: ed2 },
              reason: "在晚间追加 1 个短时专注段，优先处理临期任务。",
              score: 0.72
            });
          }
        }
        return list.slice(0, 3);
      }

      function downloadICS(plan, goals) {
        var gmap = {};
        goals.forEach(function (g) { gmap[g.id] = g; });
        var lines = [
          "BEGIN:VCALENDAR",
          "VERSION:2.0",
          "PRODID:-//DailyScheduleStandalone//CN",
          "CALSCALE:GREGORIAN",
          "METHOD:PUBLISH"
        ];
        var stamp = icsDate(new Date());
        var k = dateKey(plan.date).replace(/-/g, "");
        plan.sessions.forEach(function (s) {
          var title = s.type === "work"
            ? ("专注: " + (gmap[s.goalId] ? gmap[s.goalId].title : "任务"))
            : (s.durationMin >= 15 ? "长休息" : "短休息");
          lines.push("BEGIN:VEVENT");
          lines.push("UID:DAILY-" + k + "-" + s.id + "@daily-schedule");
          lines.push("DTSTAMP:" + stamp);
          lines.push("DTSTART:" + icsDate(s.slot.start));
          lines.push("DTEND:" + icsDate(s.slot.end));
          lines.push("SUMMARY:" + icsEscape(title));
          lines.push("DESCRIPTION:" + icsEscape("[DAILY_PLAN] " + dateKey(plan.date)));
          lines.push("END:VEVENT");
        });
        lines.push("END:VCALENDAR");

        var blob = new Blob([lines.join("\r\n")], { type: "text/calendar;charset=utf-8;" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "daily-plan-" + dateKey(plan.date) + ".ics";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function serializePlan(plan) {
        return {
          id: plan.id,
          date: plan.date.toISOString(),
          sessions: plan.sessions.map(function (s) {
            return {
              id: s.id,
              goalId: s.goalId,
              type: s.type,
              durationMin: s.durationMin,
              energyTag: s.energyTag,
              flexible: s.flexible,
              slot: { start: s.slot.start.toISOString(), end: s.slot.end.toISOString() }
            };
          }),
          conflicts: plan.conflicts,
          swapSuggestions: plan.swapSuggestions.map(function (s) {
            return {
              id: s.id,
              sessionId: s.sessionId,
              fromSlot: { start: s.fromSlot.start.toISOString(), end: s.fromSlot.end.toISOString() },
              toSlot: { start: s.toSlot.start.toISOString(), end: s.toSlot.end.toISOString() },
              reason: s.reason,
              score: s.score
            };
          }),
          generatedAt: plan.generatedAt.toISOString(),
          usedAIOptimization: !!plan.usedAIOptimization
        };
      }

      function hydratePlan(raw) {
        return {
          id: raw.id,
          date: new Date(raw.date),
          sessions: raw.sessions.map(function (s) {
            return {
              id: s.id,
              goalId: s.goalId,
              type: s.type,
              durationMin: s.durationMin,
              energyTag: s.energyTag,
              flexible: s.flexible,
              slot: { start: new Date(s.slot.start), end: new Date(s.slot.end) }
            };
          }),
          conflicts: raw.conflicts || [],
          swapSuggestions: (raw.swapSuggestions || []).map(function (s) {
            return {
              id: s.id,
              sessionId: s.sessionId,
              fromSlot: { start: new Date(s.fromSlot.start), end: new Date(s.fromSlot.end) },
              toSlot: { start: new Date(s.toSlot.start), end: new Date(s.toSlot.end) },
              reason: s.reason,
              score: s.score
            };
          }),
          generatedAt: new Date(raw.generatedAt),
          usedAIOptimization: !!raw.usedAIOptimization
        };
      }

      function subtract(source, blocked) {
        return blocked.reduce(function (cur, b) {
          var next = [];
          cur.forEach(function (slot) {
            if (b.end <= slot.start || b.start >= slot.end) {
              next.push(slot);
              return;
            }
            if (b.start > slot.start) next.push({ start: slot.start, end: b.start });
            if (b.end < slot.end) next.push({ start: b.end, end: slot.end });
          });
          return next;
        }, source);
      }

      function matchRecurrence(rule, date, specificDate) {
        var d = date.getDay();
        if (rule === "daily") return true;
        if (rule === "weekdays") return d >= 1 && d <= 5;
        if (rule === "weekends") return d === 0 || d === 6;
        if (rule === "once") return !!specificDate && dateKey(date) === specificDate;
        return false;
      }

      function toggleOnceDateField() {
        var show = value("fb-recur") === "once";
        onceDateWrap.classList.toggle("hidden", !show);
        if (show && !value("fb-once-date")) {
          setValue("fb-once-date", planDateInput.value || dateKey(new Date()));
        }
      }

      function registerServiceWorkerIfSupported() {
        if (!("serviceWorker" in navigator)) return;
        var protocol = window.location.protocol;
        var canRegister = protocol === "https:" || window.location.hostname === "localhost";
        if (!canRegister) return;
        navigator.serviceWorker.register("./sw.js").catch(function () {
          // ignore registration failure to keep app usable
        });
      }

      function parseDateOnly(s) {
        var p = s.split("-");
        return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]), 0, 0, 0, 0);
      }

      function at(date, h, m) {
        return new Date(date.getFullYear(), date.getMonth(), date.getDate(), h, m, 0, 0);
      }

      function mins(a, b) { return Math.floor((b - a) / 60000); }

      function cloneSlot(slot) { return { start: new Date(slot.start), end: new Date(slot.end) }; }

      function hhmm(date) {
        return pad2(date.getHours()) + ":" + pad2(date.getMinutes());
      }

      function dateKey(date) {
        return date.getFullYear() + "-" + pad2(date.getMonth() + 1) + "-" + pad2(date.getDate());
      }

      function icsDate(date) {
        return date.getUTCFullYear()
          + pad2(date.getUTCMonth() + 1)
          + pad2(date.getUTCDate()) + "T"
          + pad2(date.getUTCHours())
          + pad2(date.getUTCMinutes())
          + pad2(date.getUTCSeconds()) + "Z";
      }

      function icsEscape(s) {
        return String(s || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
      }

      function pad2(n) { return n < 10 ? "0" + n : String(n); }

      function uid() { return "id_" + Date.now() + "_" + Math.random().toString(36).slice(2); }

      function setStatus(msg, isError) {
        statusEl.textContent = msg || "";
        statusEl.style.color = isError ? "var(--err)" : "var(--ok)";
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function value(id) { return document.getElementById(id).value; }
      function text(id) { return value(id).trim(); }
      function setValue(id, v) { document.getElementById(id).value = v; }
    })();
  </script>
</body>
